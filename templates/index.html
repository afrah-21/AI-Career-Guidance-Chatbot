<!DOCTYPE html>
<html>
<head>
    <title>AI Career Guidance Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="chat-container">
    <h1>AI Career Guidance Chatbot</h1>
    <p class="subtitle">Ask about AI, ML, skills, projects, internships, and interviews</p>

    <div id="chat-box">
        <div class="bot-message">
            Hello! I am your AI Career Guidance Chatbot. Ask me anything about AI careers.
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your question here...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function addMessage(message, sender) {
    const chatBox = document.getElementById("chat-box");

    const wrapper = document.createElement("div");
    wrapper.className = "message-wrapper";

    const msg = document.createElement("div");
    msg.className = sender;
    msg.innerText = message;

    wrapper.appendChild(msg);

    if (sender === "user-message") {
        const actions = document.createElement("div");
        actions.className = "message-actions";

        const copyBtn = document.createElement("button");
        copyBtn.innerText = "Copy";
        copyBtn.className = "action-btn";
        copyBtn.onclick = function() {
            navigator.clipboard.writeText(message);
            copyBtn.innerText = "Copied!";
            setTimeout(() => copyBtn.innerText = "Copy", 1000);
        };

        const editBtn = document.createElement("button");
        editBtn.innerText = "Edit";
        editBtn.className = "action-btn";
        editBtn.onclick = function() {
            document.getElementById("user-input").value = message;
            document.getElementById("user-input").focus();
        };

        actions.appendChild(copyBtn);
        actions.appendChild(editBtn);
        wrapper.appendChild(actions);
    }

    chatBox.appendChild(wrapper);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById("user-input");
    const message = input.value.trim();

    if (message === "") return;

    addMessage(message, "user-message");
    input.value = "";

    fetch("/get_response", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: message })
    })
    .then(response => response.json())
    .then(data => {
        addMessage(data.response, "bot-message");
    });
}

document.getElementById("user-input").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
